[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "PIXEL_RULER_PRICE_USD,PIXEL_RULER_PRICE_INR,SMART_CAPTURE_PRICE_USD,SMART_CAPTURE_PRICE_INR"
